<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YouTube Video Exporter</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f0f0f;
      color: #f1f1f1;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      width: 100%;
      max-width: 560px;
      padding: 24px;
    }

    .top-bar {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 8px;
    }

    #lang-select {
      background: #1a1a1a;
      color: #ccc;
      border: 1px solid #3f3f3f;
      border-radius: 6px;
      padding: 4px 8px;
      font-size: 13px;
      cursor: pointer;
      outline: none;
    }

    h1 {
      font-size: 28px;
      font-weight: 700;
      text-align: center;
      margin-bottom: 8px;
    }

    .subtitle {
      text-align: center;
      color: #aaa;
      font-size: 14px;
      margin-bottom: 32px;
    }

    .search-box {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    input[type="text"] {
      flex: 1;
      padding: 12px 16px;
      border: 1px solid #3f3f3f;
      border-radius: 8px;
      background: #1a1a1a;
      color: #f1f1f1;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus { border-color: #ff0000; }
    input[type="text"]::placeholder { color: #666; }

    button {
      padding: 12px 24px;
      background: #ff0000;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    button:hover { background: #cc0000; }
    button:disabled { background: #555; cursor: not-allowed; }

    .columns {
      display: flex;
      gap: 16px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .columns label {
      display: flex;
      align-items: center;
      gap: 6px;
      color: #ccc;
      font-size: 14px;
      cursor: pointer;
    }

    .columns input[type="checkbox"] {
      accent-color: #ff0000;
      width: 16px;
      height: 16px;
      cursor: pointer;
    }

    .examples {
      color: #777;
      font-size: 12px;
      margin-bottom: 24px;
      line-height: 1.8;
    }

    .examples code {
      background: #222;
      padding: 2px 6px;
      border-radius: 4px;
      color: #aaa;
    }

    .status {
      text-align: center;
      padding: 16px;
      border-radius: 8px;
      font-size: 14px;
      display: none;
    }

    .status.loading { display: block; background: #1a1a2e; color: #7b8cff; }
    .status.success { display: block; background: #1a2e1a; color: #7bff7b; }
    .status.error { display: block; background: #2e1a1a; color: #ff7b7b; }

    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid #7b8cff;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    #channel-panel {
      display: none;
      background: #1a1a1a;
      border: 1px solid #3f3f3f;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 16px;
    }

    .channel-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }

    .channel-header img { width: 48px; height: 48px; border-radius: 50%; }
    .channel-header:hover { opacity: 0.8; }
    .channel-header .info h2 { font-size: 18px; font-weight: 600; }
    .channel-header .info span { color: #aaa; font-size: 13px; }

    .playlist-list { max-height: 240px; overflow-y: auto; margin-bottom: 16px; }

    .playlist-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.15s;
    }

    .playlist-item:hover { background: #262626; }

    .playlist-item input[type="checkbox"] {
      accent-color: #ff0000;
      width: 16px;
      height: 16px;
      cursor: pointer;
    }

    .playlist-item label { flex: 1; cursor: pointer; font-size: 14px; }
    .playlist-item .count { color: #888; font-size: 12px; white-space: nowrap; }

    .playlist-list::-webkit-scrollbar { width: 6px; }
    .playlist-list::-webkit-scrollbar-track { background: transparent; }
    .playlist-list::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }

    #search-results {
      background: #1a1a1a;
      border: 1px solid #3f3f3f;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
    }

    .channel-result {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 12px;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s;
    }

    .channel-result:hover { background: #262626; }
    .channel-result img { width: 40px; height: 40px; border-radius: 50%; }
    .channel-result .ch-info { flex: 1; }
    .channel-result .ch-info .ch-name { font-size: 14px; font-weight: 500; }
    .channel-result .ch-info .ch-stats { font-size: 12px; color: #888; }

    .img-fallback {
      width: 40px; height: 40px; border-radius: 50%;
      background: #333; display: flex; align-items: center; justify-content: center;
      font-size: 18px; color: #888; flex-shrink: 0;
    }

    .channel-header .img-fallback { width: 48px; height: 48px; font-size: 22px; }

    #related-keywords {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 4px;
    }

    .kw-chip {
      display: flex;
      align-items: center;
      gap: 4px;
      background: #262626;
      border: 1px solid #3f3f3f;
      border-radius: 16px;
      padding: 4px 10px;
      font-size: 13px;
      color: #ccc;
      cursor: pointer;
      transition: all 0.15s;
    }

    .kw-chip:hover { border-color: #ff0000; }
    .kw-chip.active { background: #3a1a1a; border-color: #ff0000; color: #ff6666; }

    .kw-chip input[type="checkbox"] {
      accent-color: #ff0000;
      width: 14px;
      height: 14px;
      cursor: pointer;
    }

    #matched-videos {
      max-height: 300px;
      overflow-y: auto;
      margin-top: 10px;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
    }

    .matched-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 12px;
      background: #1f1f1f;
      border-bottom: 1px solid #2a2a2a;
      font-size: 12px;
      color: #888;
      position: sticky;
      top: 0;
    }

    .matched-header a {
      color: #7b8cff;
      cursor: pointer;
      text-decoration: none;
      font-size: 12px;
    }

    .matched-header a:hover { text-decoration: underline; }

    .matched-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 12px;
      border-bottom: 1px solid #1a1a1a;
      font-size: 13px;
      transition: background 0.1s;
    }

    .matched-item:hover { background: #1f1f1f; }
    .matched-item:last-child { border-bottom: none; }

    .matched-item input[type="checkbox"] {
      accent-color: #ff0000;
      width: 15px;
      height: 15px;
      cursor: pointer;
      flex-shrink: 0;
    }

    .matched-item .v-title {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .matched-item .v-date {
      color: #666;
      font-size: 11px;
      white-space: nowrap;
    }

    #matched-videos::-webkit-scrollbar { width: 6px; }
    #matched-videos::-webkit-scrollbar-track { background: transparent; }
    #matched-videos::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }
  </style>
</head>

    <div id="channel-panel">

          <button id="clearFilterBtn" style="padding:10px 16px; font-size:13px; background:#333; display:none;" data-i18n="clearFilter"></button>
        </div>
        <div id="related-keywords" style="display:none;"></div>
        <div id="filter-status" style="color:#aaa; font-size:13px; margin-top:6px; display:none;"></div>

      </div>

        <label><input type="checkbox" value="url" checked /> <span data-i18n="colUrl"></span></label>
        <label><input type="checkbox" value="date" checked /> <span data-i18n="colDate"></span></label>
        <label><input type="checkbox" value="transcript" /> <span data-i18n="colTranscript"></span></label>
      </div>

      <button id="downloadBtn" style="width:100%" data-i18n="download"></button>

        downloadComplete: (n) => `Download voltooid! ${n} video's`,
        noResults: "Geen resultaten gevonden.", enterQuery: "Voer een YouTuber-naam of URL in.",
        selectColumn: "Selecteer ten minste één kolom.", unknownError: "Er is een onbekende fout opgetreden.",
        keywordPlaceholder: "Filteren op trefwoord", filter: "Filteren", clearFilter: "Wissen",
        filterResult: (n, total) => `${n} van ${total} video's komen overeen`,
        relatedLabel: "Gerelateerd:", filteringVideos: "Video's filteren...",
        selectAll: "Alles selecteren", deselectAll: "Alles deselecteren", matchedCount: (n) => `${n} resultaten`,
      },
      id: {
        subtitle: "Unduh semua judul dan tautan video dari YouTuber mana pun sebagai CSV",
        placeholder: "Masukkan nama YouTuber atau URL channel",
        search: "Cari",
        examples: 'Contoh: <code>@channelhandle</code> <code>Nama Channel</code> <code>https://www.youtube.com/@handle</code> <code>https://www.youtube.com/channel/UC...</code>',
        selectChannel: "Pilih channel:",
        colTitle: "Judul", colUrl: "Tautan", colDate: "Tanggal", colTranscript: "Subtitle",
        download: "Unduh", allVideos: "Semua Video",
        totalVideos: (n) => `Total ${n} video`,
        subscribers: (n) => `${n} subscriber`, videos: (n) => `${n} video`,
        searching: "Mencari channel...", loadingChannel: "Memuat info channel...",
        downloading: "Mengunduh daftar video...",
        extractingTranscripts: "Mengekstrak subtitle... (mungkin butuh beberapa menit)",
        downloadComplete: (n) => `Unduhan selesai! ${n} video`,
        noResults: "Tidak ada hasil.", enterQuery: "Silakan masukkan nama YouTuber atau URL channel.",
        selectColumn: "Pilih setidaknya satu kolom.", unknownError: "Terjadi kesalahan tidak diketahui.",
        keywordPlaceholder: "Filter berdasarkan kata kunci", filter: "Filter", clearFilter: "Hapus",
        filterResult: (n, total) => `${n} dari ${total} video cocok`,
        relatedLabel: "Terkait:", filteringVideos: "Memfilter video...",
        selectAll: "Pilih semua", deselectAll: "Hapus semua", matchedCount: (n) => `${n} cocok`,
      },
      tl: {
        subtitle: "I-download ang lahat ng video title at link mula sa kahit anong YouTuber bilang CSV",
        placeholder: "Ilagay ang pangalan ng YouTuber o channel URL",
        search: "Hanapin",
        examples: 'Halimbawa: <code>@channelhandle</code> <code>Pangalan ng Channel</code> <code>https://www.youtube.com/@handle</code> <code>https://www.youtube.com/channel/UC...</code>',
        selectChannel: "Pumili ng channel:",
        colTitle: "Pamagat", colUrl: "Link", colDate: "Petsa", colTranscript: "Subtitle",
        download: "I-download", allVideos: "Lahat ng Video",
        totalVideos: (n) => `Kabuuang ${n} video`,
        subscribers: (n) => `${n} subscriber`, videos: (n) => `${n} video`,
        searching: "Naghahanap ng channel...", loadingChannel: "Nilo-load ang impormasyon...",
        downloading: "Dina-download ang listahan ng video...",
        extractingTranscripts: "Kinukuha ang subtitle... (maaaring tumagal ng ilang minuto)",
        downloadComplete: (n) => `Download tapos na! ${n} video`,
        noResults: "Walang resulta.", enterQuery: "Pakilagay ang pangalan ng YouTuber o URL.",
        selectColumn: "Pumili ng kahit isang column.", unknownError: "May naganap na hindi kilalang error.",
        keywordPlaceholder: "I-filter ayon sa keyword", filter: "Filter", clearFilter: "Burahin",
        filterResult: (n, total) => `${n} sa ${total} video ang tumugma`,
        relatedLabel: "Kaugnay:", filteringVideos: "Fini-filter ang mga video...",
        selectAll: "Piliin lahat", deselectAll: "Alisin lahat", matchedCount: (n) => `${n} tumugma`,
      },
    };

    let lang = localStorage.getItem("yt-exporter-lang") || "en";
    const t = (key, ...args) => {
      const val = i18n[lang]?.[key] || i18n.en[key];
      return typeof val === "function" ? val(...args) : val;
    };

    const langSelect = document.getElementById("lang-select");
    langSelect.value = lang;
    langSelect.addEventListener("change", () => {
      lang = langSelect.value;
      localStorage.setItem("yt-exporter-lang", lang);
      applyI18n();
      if (channelData) renderChannelPanel();
    });

    function applyI18n() {
      document.querySelectorAll("[data-i18n]").forEach((el) => {
        el.textContent = t(el.dataset.i18n);
      });
      document.querySelectorAll("[data-i18n-html]").forEach((el) => {
        el.innerHTML = t(el.dataset.i18nHtml);
      });
      document.querySelectorAll("[data-i18n-placeholder]").forEach((el) => {
        el.placeholder = t(el.dataset.i18nPlaceholder);
      });
    }

    applyI18n();

    const input = document.getElementById("query");
    const searchBtn = document.getElementById("searchBtn");
    const downloadBtn = document.getElementById("downloadBtn");
    const statusEl = document.getElementById("status");
    const panel = document.getElementById("channel-panel");
    const searchResults = document.getElementById("search-results");

    let channelData = null;
    let activeKeywords = [];

    const keywordInput = document.getElementById("keyword-input");
    const keywordBtn = document.getElementById("keywordBtn");
    const clearFilterBtn = document.getElementById("clearFilterBtn");
    const relatedEl = document.getElementById("related-keywords");
    const filterStatusEl = document.getElementById("filter-status");

    input.addEventListener("keydown", (e) => { if (e.key === "Enter") searchChannel(); });
    searchBtn.addEventListener("click", searchChannel);
    downloadBtn.addEventListener("click", downloadVideos);
    keywordBtn.addEventListener("click", filterByKeyword);
    keywordInput.addEventListener("keydown", (e) => { if (e.key === "Enter") filterByKeyword(); });
    clearFilterBtn.addEventListener("click", clearFilter);

    function formatCount(n) {
      if (lang === "ko") {
        if (n >= 10000) return (n / 10000).toFixed(1) + "만";
        if (n >= 1000) return (n / 1000).toFixed(1) + "천";
      } else if (lang === "ja") {
        if (n >= 10000) return (n / 10000).toFixed(1) + "万";
      } else if (lang === "zh") {
        if (n >= 10000) return (n / 10000).toFixed(1) + "万";
      }
      if (n >= 1000000) return (n / 1000000).toFixed(1) + "M";
      if (n >= 1000) return (n / 1000).toFixed(1) + "K";
      return n.toString();
    }

    async function searchChannel() {
      const query = input.value.trim();
      if (!query) { showStatus("error", t("enterQuery")); return; }

      searchBtn.disabled = true;
      panel.style.display = "none";
      searchResults.style.display = "none";
      showStatus("loading", `<span class="spinner"></span>${t("searching")}`);

      try {
        const res = await fetch(`/api/search-channels?q=${encodeURIComponent(query)}`);
        if (!res.ok) { const err = await res.json(); throw new Error(err.error || t("unknownError")); }
        const channels = await res.json();
        if (channels.length === 0) { showStatus("error", t("noResults")); return; }
        if (channels.length === 1) { await selectChannel(channels[0].channelId); return; }
        renderSearchResults(channels);
        hideStatus();
      } catch (err) {
        showStatus("error", err.message);
      } finally {
        searchBtn.disabled = false;
      }
    }

    function imgFallback(el, name) {
      const div = document.createElement("div");
      div.className = el.closest(".channel-header") ? "img-fallback channel-header" : "img-fallback";
      div.textContent = (name || "?")[0];
      el.replaceWith(div);
    }

    function renderSearchResults(channels) {
      const list = document.getElementById("channel-list");
      list.innerHTML = channels.map((ch) => `
        <div class="channel-result" onclick="selectChannel('${ch.channelId}')">
          <img src="${ch.thumbnail}" alt="" onerror="imgFallback(this, '${ch.title.replace(/'/g, "\\'")}')" referrerpolicy="no-referrer" />
          <div class="ch-info">
            <div class="ch-name">${ch.title}</div>
            <div class="ch-stats">${t("subscribers", formatCount(ch.subscriberCount))} · ${t("videos", formatCount(ch.videoCount))}</div>
          </div>
        </div>
      `).join("");
      searchResults.style.display = "block";
    }

    async function selectChannel(channelId) {
      searchResults.style.display = "none";
      clearFilter();
      showStatus("loading", `<span class="spinner"></span>${t("loadingChannel")}`);

      try {
        const res = await fetch(`/api/channel?id=${encodeURIComponent(channelId)}`);
        if (!res.ok) { const err = await res.json(); throw new Error(err.error || t("unknownError")); }
        channelData = await res.json();
        renderChannelPanel();
        hideStatus();
      } catch (err) {
        showStatus("error", err.message);
      }
    }

    function renderChannelPanel() {
      document.getElementById("ch-link").href = `https://www.youtube.com/channel/${channelData.channelId}`;
      const thumb = document.getElementById("ch-thumb");
      thumb.onerror = () => imgFallback(thumb, channelData.channelTitle);
      thumb.src = channelData.thumbnail;
      document.getElementById("ch-title").textContent = channelData.channelTitle;
      document.getElementById("ch-count").textContent = t("totalVideos", channelData.videoCount);

      const list = document.getElementById("playlist-list");
      let html = `
        <div class="playlist-item">
          <input type="checkbox" class="playlist-cb" id="pl-all" value="${channelData.uploadsPlaylistId}" data-title="${t("allVideos")}" checked />
          <label for="pl-all">${t("allVideos")}</label>
          <span class="count">${channelData.videoCount}</span>
        </div>`;

      channelData.playlists.forEach((pl, i) => {
        html += `
          <div class="playlist-item">
            <input type="checkbox" class="playlist-cb" id="pl-${i}" value="${pl.id}" data-title="${pl.title.replace(/"/g, '&quot;')}" />
            <label for="pl-${i}">${pl.title}</label>
            <span class="count">${pl.count}</span>
          </div>`;
      });

      list.innerHTML = html;
      panel.style.display = "block";
    }

    let matchedVideos = [];
    const matchedEl = document.getElementById("matched-videos");

    async function filterByKeyword() {
      const kw = keywordInput.value.trim();
      if (!kw || !channelData) return;

      activeKeywords = [kw];
      keywordBtn.disabled = true;
      showStatus("loading", `<span class="spinner"></span>${t("filteringVideos")}`);

      try {
        const playlistId = document.querySelector('.playlist-cb:checked')?.value || channelData.uploadsPlaylistId;
        const res = await fetch(`/api/filter-videos?playlistId=${encodeURIComponent(playlistId)}&keywords=${encodeURIComponent(kw)}`);
        if (!res.ok) { const err = await res.json(); throw new Error(err.error || t("unknownError")); }
        const data = await res.json();
        matchedVideos = data.matched;

        // Show related keywords
        if (data.relatedKeywords.length > 0) {
          relatedEl.innerHTML = `<span style="color:#888; font-size:12px;">${t("relatedLabel")}</span>` +
            data.relatedKeywords.map((rk) => `
              <label class="kw-chip" onclick="this.classList.toggle('active')">
                <input type="checkbox" value="${rk}" onchange="updateFilter()" />${rk}
              </label>
            `).join("");
          relatedEl.style.display = "flex";
        } else {
          relatedEl.style.display = "none";
        }

        renderMatchedVideos(data.matched);
        filterStatusEl.textContent = t("filterResult", data.totalMatched, channelData.videoCount);
        filterStatusEl.style.display = "block";
        clearFilterBtn.style.display = "inline-block";
        hideStatus();
      } catch (err) {
        showStatus("error", err.message);
      } finally {
        keywordBtn.disabled = false;
      }
    }

    function renderMatchedVideos(videos) {
      if (videos.length === 0) {
        matchedEl.style.display = "none";
        return;
      }
      matchedEl.innerHTML = `
        <div class="matched-header">
          <span>${t("matchedCount", videos.length)}</span>
          <span>
            <a onclick="toggleAllMatched(true)">${t("selectAll")}</a> / <a onclick="toggleAllMatched(false)">${t("deselectAll")}</a>
          </span>
        </div>` +
        videos.map((v, i) => `
          <div class="matched-item">
            <input type="checkbox" checked id="mv-${i}" data-url="${v.url}" />
            <span class="v-title" title="${v.title}">${v.title}</span>
            <span class="v-date">${v.publishedAt.slice(0, 10)}</span>
          </div>
        `).join("");
      matchedEl.style.display = "block";
    }

    function toggleAllMatched(checked) {
      document.querySelectorAll('#matched-videos input[type="checkbox"]').forEach((cb) => { cb.checked = checked; });
    }

    function updateFilter() {
      const baseKw = keywordInput.value.trim();
      const extraKws = [...document.querySelectorAll('#related-keywords input:checked')].map((c) => c.value);
      activeKeywords = [baseKw, ...extraKws].filter(Boolean);

      const playlistId = document.querySelector('input[name="playlist"]:checked')?.value || channelData.uploadsPlaylistId;
      fetch(`/api/filter-videos?playlistId=${encodeURIComponent(playlistId)}&keywords=${encodeURIComponent(activeKeywords.join(","))}`)
        .then((r) => r.json())
        .then((data) => {
          matchedVideos = data.matched;
          renderMatchedVideos(data.matched);
          filterStatusEl.textContent = t("filterResult", data.totalMatched, channelData.videoCount);
        });
    }

    function clearFilter() {
      activeKeywords = [];
      matchedVideos = [];
      keywordInput.value = "";
      relatedEl.style.display = "none";
      relatedEl.innerHTML = "";
      filterStatusEl.style.display = "none";
      clearFilterBtn.style.display = "none";
      matchedEl.style.display = "none";
      matchedEl.innerHTML = "";
    }

    async function downloadVideos() {
      const selectedPlaylists = [...document.querySelectorAll('.playlist-cb:checked')];
      if (selectedPlaylists.length === 0) { showStatus("error", t("selectColumn")); return; }

      const cols = [...document.querySelectorAll('.columns input:checked')].map(c => c.value);
      if (cols.length === 0) { showStatus("error", t("selectColumn")); return; }

      downloadBtn.disabled = true;
      const hasTranscript = cols.includes("transcript");
      showStatus("loading", `<span class="spinner"></span>${hasTranscript ? t("extractingTranscripts") : t("downloading")}`);

      try {
        let totalVideoCount = 0;

        for (const pl of selectedPlaylists) {
          const playlistId = pl.value;
          const playlistTitle = pl.dataset.title;
          const isAllVideos = pl.id === "pl-all";
          const name = isAllVideos ? channelData.channelTitle : `${channelData.channelTitle}_${playlistTitle}`;

          const controller = new AbortController();
          const timeout = hasTranscript ? 600000 : 60000;
          const timer = setTimeout(() => controller.abort(), timeout);

          // If filter is active, only download checked videos (only for single playlist)
          const checkedUrls = (selectedPlaylists.length === 1 && matchedVideos.length > 0)
            ? [...document.querySelectorAll('#matched-videos input[type="checkbox"]:checked')].map((cb) => cb.dataset.url).filter(Boolean)
            : null;

          let res;
          if (checkedUrls) {
            res = await fetch(`/api/videos`, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ playlistId, cols: cols.join(","), name, lang, videoUrls: checkedUrls }),
              signal: controller.signal,
            });
          } else {
            let videoUrl = `/api/videos?playlistId=${encodeURIComponent(playlistId)}&cols=${cols.join(",")}&name=${encodeURIComponent(name)}&lang=${lang}`;
            if (activeKeywords.length > 0) {
              videoUrl += `&keywords=${encodeURIComponent(activeKeywords.join(","))}`;
            }
            res = await fetch(videoUrl, { signal: controller.signal });
          }
          clearTimeout(timer);

          if (!res.ok) { const err = await res.json(); throw new Error(err.error || t("unknownError")); }

          const videoCount = parseInt(res.headers.get("X-Video-Count") || "0", 10);
          totalVideoCount += videoCount;
          const blob = await res.blob();

          const url = URL.createObjectURL(blob);
          const a = document.createElement("a");
          a.href = url;
          a.download = `${name.replace(/[^a-zA-Z0-9가-힣]/g, "_")}_videos.csv`;
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          URL.revokeObjectURL(url);
        }

        showStatus("success", t("downloadComplete", totalVideoCount));
      } catch (err) {
        showStatus("error", err.message);
      } finally {
        downloadBtn.disabled = false;
      }
    }

    function showStatus(type, html) {
      statusEl.className = "status " + type;
      statusEl.innerHTML = html;
    }

    function hideStatus() {
      statusEl.className = "status";
      statusEl.innerHTML = "";
    }
  </script>
